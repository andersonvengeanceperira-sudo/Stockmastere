<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StockMaster ERP</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#111;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
color:#0ea5e9;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

.hero{
padding:80px;
text-align:center;
}

.hero h2{
font-size:40px;
}

.btn{
background:#ff7a00;
padding:12px 25px;
border:none;
color:white;
cursor:pointer;
margin-top:20px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:40px;
}

.card{
background:#111827;
padding:20px;
border-radius:10px;
text-align:center;
}

</style>

</head>

<body>

<header>

<h1>StockMaster ERP</h1>

<nav>
<a href="#">Dashboard</a>
<a href="#">Estoque</a>
<a href="#">Logística</a>
<a href="#">Transporte</a>
<a href="#">Admin</a>
</nav>

</header>

<section class="hero">

<h2>Gestão Logística Inteligente</h2>

<p>
Controle de estoque, transporte e mercadorias em um único sistema.
</p>

<button class="btn">Acessar Sistema</button>

</section>

<section class="dashboard">

<div class="card">
<h3>Produtos</h3>
<p>1.542</p>
</div>

<div class="card">
<h3>Estoques</h3>
<p>12</p>
</div>

<div class="card">
<h3>Transportes</h3>
<p>34</p>
</div>

<div class="card">
<h3>Funcionários</h3>
<p>10</p>
</div>

</section>

</body>
</html>
